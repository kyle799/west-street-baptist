# Production stack — zero-downtime blue/green for the Django web service.
# Only one of web-blue / web-green serves at steady state; deploy-swap.sh
# starts the idle color, waits for its healthcheck, repoints nginx, and
# drains the old one.
name: weststreet

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  web-blue: &web-service
    image: ghcr.io/${GITHUB_REPO}/web:${IMAGE_TAG}
    pull_policy: always
    environment:
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-true}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-no-reply@weststreetbaptist.org}
      CHURCH_NOTIFY_EMAIL: ${CHURCH_NOTIFY_EMAIL:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 4s
      start_period: 30s
      retries: 3
    stop_grace_period: 30s
    restart: unless-stopped
    networks:
      - internal

  web-green:
    <<: *web-service

  bible:
    image: ghcr.io/${GITHUB_REPO}/bible:${IMAGE_TAG}
    pull_policy: always
    environment:
      DATABASE_PATH: /data/bible.db
    volumes:
      - bible_data:/data
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_BIND_IP:-0.0.0.0}:${NGINX_HOST_PORT:-80}:80"
    volumes:
      - ./nginx/${NGINX_PROFILE:-conf.d.cloudflare}:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      # Mount the *directory*, not the file: deploy-swap.sh rewrites the
      # upstream with `sed -i`, which swaps the inode. A single-file bind mount
      # pins the original inode and never sees the change; a directory mount
      # resolves the filename on each open, so reloads pick up the new color.
      - ./nginx/upstream:/etc/nginx/upstream:ro
    restart: unless-stopped
    depends_on:
      - bible
    networks:
      - internal
      - external

volumes:
  pgdata:
  bible_data:

networks:
  internal:
  external:
