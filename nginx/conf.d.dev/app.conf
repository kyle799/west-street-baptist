# Local-only nginx (docker compose --profile proxy). Direct upstreams, no
# blue/green file, no rate limiting — just to exercise routing end to end.
server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 1m;

    location = /bible        { proxy_pass http://bible:5000; }
    location ^~ /passage     { proxy_pass http://bible:5000; }
    location ^~ /verse/      { proxy_pass http://bible:5000; }
    location = /translations { proxy_pass http://bible:5000; }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
