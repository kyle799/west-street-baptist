# Production nginx — Cloudflare tunnel profile.
# TLS terminates at Cloudflare; this server speaks plain HTTP on :80.
# Real client IP arrives in CF-Connecting-IP; we key rate limits off it.

upstream web_backend {
    # Rewritten by scripts/deploy-swap.sh — points at web-blue:8000 or web-green:8000.
    include /etc/nginx/active-upstream.conf;
    keepalive 32;
}

upstream bible_backend {
    server bible:5000;
    keepalive 8;
}

# Prefer the Cloudflare-provided client IP; fall back to the socket peer.
map $http_cf_connecting_ip $real_client_ip {
    default $http_cf_connecting_ip;
    ""      $remote_addr;
}

limit_req_zone $real_client_ip zone=form_limit:10m rate=20r/m;

server {
    listen 80 default_server;
    http2 on;
    server_name _;

    # TLS already terminated at Cloudflare.
    set $fwd_proto https;

    client_max_body_size 1m;

    # --- Bible reader (Flask service). Paths don't collide with Django. ---
    location = /bible {
        proxy_pass http://bible_backend;
        include /etc/nginx/snippets/proxy.conf;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
    }
    location ^~ /passage {
        proxy_pass http://bible_backend;
        include /etc/nginx/snippets/proxy.conf;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
    }
    location ^~ /verse/ {
        proxy_pass http://bible_backend;
        include /etc/nginx/snippets/proxy.conf;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
    }
    location = /translations {
        proxy_pass http://bible_backend;
        include /etc/nginx/snippets/proxy.conf;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
    }

    # --- Rate-limited public form endpoints ---
    location = /contact/ {
        limit_req zone=form_limit burst=10 nodelay;
        proxy_pass http://web_backend;
        include /etc/nginx/snippets/proxy.conf;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
    }
    location = /prayer/ {
        limit_req zone=form_limit burst=10 nodelay;
        proxy_pass http://web_backend;
        include /etc/nginx/snippets/proxy.conf;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
    }

    # --- Static files (served by WhiteNoise inside the web container) ---
    location /static/ {
        proxy_pass http://web_backend;
        include /etc/nginx/snippets/proxy.conf;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        proxy_cache_valid 200 5m;
    }

    # --- Everything else -> Django ---
    location / {
        proxy_pass http://web_backend;
        include /etc/nginx/snippets/proxy.conf;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
    }
}
