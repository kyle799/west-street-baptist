name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
            ghcr.io/${{ github.repository }}/web:latest
      - name: Build & push bible image
        uses: docker/build-push-action@v6
        with:
          context: ./bible_flask_api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/bible:${{ github.sha }}
            ghcr.io/${{ github.repository }}/bible:latest

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: self-hosted          # runner lives on the VPS (behind NAT)
    environment: production
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy (blue/green swap)
        env:
          IMAGE_TAG: ${{ github.sha }}
          DEPLOY_ROOT: /home/kyle/west-street-baptist/west-street-baptist
        run: |
          cd "$DEPLOY_ROOT"
          git pull --ff-only
          sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" .env
          # Postgres must be up and healthy BEFORE the swap: deploy-swap starts
          # the web color with --no-deps and its entrypoint runs `migrate`
          # immediately, so the DB host must already resolve and accept
          # connections. (--wait blocks until postgres's healthcheck passes.)
          docker compose -f docker-compose.prod.yml up -d --no-deps --wait postgres bible
          ./scripts/deploy-swap.sh
          docker compose -f docker-compose.prod.yml up -d --no-deps nginx
          # Safety reload: re-resolve upstream container IPs once everything is
          # up. nginx caches the web upstream IP at load time, so if a web
          # container was recreated with a new IP since the swap's own reload,
          # this prevents a stale-IP 502. Validate config first.
          docker compose -f docker-compose.prod.yml exec -T nginx nginx -t
          docker compose -f docker-compose.prod.yml exec -T nginx nginx -s reload
          docker image prune -f
