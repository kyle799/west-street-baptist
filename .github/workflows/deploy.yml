name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
            ghcr.io/${{ github.repository }}/web:latest
      - name: Build & push bible image
        uses: docker/build-push-action@v6
        with:
          context: ./bible_flask_api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/bible:${{ github.sha }}
            ghcr.io/${{ github.repository }}/bible:latest

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: self-hosted          # runner lives on the VPS (behind NAT)
    environment: production
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy (blue/green swap)
        env:
          IMAGE_TAG: ${{ github.sha }}
          DEPLOY_ROOT: /home/kyle/west-street-baptist/west-street-baptist
        run: |
          cd "$DEPLOY_ROOT"
          git pull --ff-only
          sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" .env
          ./scripts/deploy-swap.sh
          docker compose -f docker-compose.prod.yml up -d --no-deps postgres bible nginx
          docker image prune -f
