<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scripture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* West Street Baptist brand palette (see ../west-street-baptist-brand-sheet.html).
     Original gold/crimson accents remapped to Sunday Blue so the reader
     matches the church site. */
  --ink:       #1C2733;
  --parchment: #F2EEE3;
  --warm-bg:   #F7F4EB;
  --gold:      #2E5DA6;
  --gold-lt:   #8FB4D4;
  --crimson:   #27508F;
  --muted:     #5C6C7C;
  --border:    #CDD7E0;
  --header:    #1C2733;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--warm-bg);
  color: var(--ink);
  font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
  min-height: 100vh;
}

/* ── HEADER ─────────────────────────────────────────────────────── */
header {
  background: var(--header);
  border-bottom: 1px solid #2E2010;
  position: sticky; top: 0; z-index: 100;
}

.header-inner {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 1.5rem;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 1.25rem;
}

.wordmark {
  font-family: 'Asap', system-ui, sans-serif;
  font-size: .7rem;
  font-weight: 700;
  letter-spacing: .28em;
  color: var(--gold);
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
  text-decoration: none;
}
.wordmark:hover { color: var(--gold-lt); }
.wordmark-cross {
  display: inline-block;
  margin-right: .45em;
  font-size: .6rem;
  vertical-align: middle;
  opacity: .8;
}

.divider {
  width: 1px; height: 18px;
  background: #302010;
  flex-shrink: 0;
}

.nav-form {
  flex: 1;
  display: flex;
  align-items: center;
  gap: .5rem;
  min-width: 0;
}

.ref-input {
  flex: 1;
  background: #221808;
  border: 1px solid #3A2810;
  border-radius: 2px;
  color: #E8DECA;
  font-family: 'EB Garamond', serif;
  font-size: 1.05rem;
  padding: .35rem .75rem;
  outline: none;
  min-width: 0;
  transition: border-color .15s;
  letter-spacing: .01em;
}
.ref-input::placeholder { color: #5A4830; font-style: italic; }
.ref-input:focus { border-color: var(--gold); }

.trans-select {
  background: #221808;
  border: 1px solid #3A2810;
  border-radius: 2px;
  color: #C8B88A;
  font-family: 'Cinzel', serif;
  font-size: .65rem;
  letter-spacing: .1em;
  padding: .38rem .5rem;
  outline: none;
  cursor: pointer;
  flex-shrink: 0;
  max-width: 90px;
}

.go-btn {
  background: var(--crimson);
  border: none;
  border-radius: 2px;
  color: #F0E4D4;
  font-family: 'Cinzel', serif;
  font-size: .6rem;
  letter-spacing: .18em;
  padding: .42rem 1rem;
  cursor: pointer;
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background .15s;
}
.go-btn:hover { background: #9A2525; }
.go-btn:active { background: #611515; }

/* ── MAIN ───────────────────────────────────────────────────────── */
main {
  max-width: 680px;
  margin: 0 auto;
  padding: 3.5rem 2rem 7rem;
}

/* ── WELCOME ────────────────────────────────────────────────────── */
.welcome {
  text-align: center;
  padding: 7rem 1rem 5rem;
  animation: fadeUp .6s ease both;
}
.welcome-ornament {
  font-size: 2.5rem;
  color: var(--gold);
  opacity: .35;
  margin-bottom: 2rem;
  display: block;
  letter-spacing: .5em;
}
.welcome-title {
  font-family: 'Cinzel', serif;
  font-size: .7rem;
  letter-spacing: .45em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 1.25rem;
}
.welcome-hint {
  color: var(--muted);
  font-style: italic;
  font-size: 1.1rem;
  line-height: 1.7;
}
.welcome-examples {
  margin-top: 2.5rem;
  display: flex;
  flex-wrap: wrap;
  gap: .5rem;
  justify-content: center;
}
.example-chip {
  font-family: 'Cinzel', serif;
  font-size: .58rem;
  letter-spacing: .12em;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: .3rem .7rem;
  cursor: pointer;
  transition: all .15s;
  background: none;
  text-transform: uppercase;
}
.example-chip:hover {
  background: var(--ink);
  color: var(--parchment);
  border-color: var(--ink);
}

/* ── LOADING ────────────────────────────────────────────────────── */
.loading-wrap {
  text-align: center;
  padding: 6rem 0;
  animation: fadeIn .3s ease;
}
.loading-text {
  font-family: 'Cinzel', serif;
  font-size: .6rem;
  letter-spacing: .35em;
  color: var(--muted);
  text-transform: uppercase;
}
.loading-bar {
  width: 40px; height: 2px;
  background: var(--gold);
  margin: 1.25rem auto 0;
  animation: shimmer 1.2s ease-in-out infinite;
}
@keyframes shimmer {
  0%   { transform: scaleX(.3); opacity: .4; }
  50%  { transform: scaleX(1);  opacity: 1;  }
  100% { transform: scaleX(.3); opacity: .4; }
}

/* ── ERROR ──────────────────────────────────────────────────────── */
.error-wrap {
  text-align: center;
  padding: 5rem 1rem;
  animation: fadeUp .4s ease;
}
.error-glyph {
  font-family: 'Cinzel', serif;
  font-size: 2.5rem;
  color: var(--crimson);
  opacity: .25;
  margin-bottom: 1.5rem;
  display: block;
}
.error-msg {
  color: var(--muted);
  font-style: italic;
  font-size: 1.1rem;
}

/* ── PASSAGE HEADER ─────────────────────────────────────────────── */
.passage-header {
  text-align: center;
  margin-bottom: 3.5rem;
  animation: fadeUp .5s ease both;
}
.book-label {
  font-family: 'Cinzel', serif;
  font-size: .65rem;
  letter-spacing: .42em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: .9rem;
  display: block;
}
.chapter-numeral {
  font-family: 'Cinzel', serif;
  font-size: 4rem;
  font-weight: 600;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 1.6rem;
  display: block;
}
.chapter-ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .9rem;
  margin-bottom: 1.2rem;
}
.chapter-ornament::before,
.chapter-ornament::after {
  content: '';
  width: 50px;
  height: 1px;
  background: var(--gold-lt);
}
.chapter-ornament::after {
  background: var(--gold-lt);
}
.ornament-center {
  color: var(--gold);
  font-size: .55rem;
  letter-spacing: .4em;
}
.trans-pill {
  display: inline-block;
  font-family: 'Cinzel', serif;
  font-size: .55rem;
  letter-spacing: .22em;
  color: var(--crimson);
  border: 1px solid currentColor;
  padding: .15rem .55rem;
  border-radius: 2px;
  opacity: .65;
  text-transform: uppercase;
  margin-top: .5rem;
}

/* ── VERSES ─────────────────────────────────────────────────────── */
.verses-wrap {
  font-size: 1.2rem;
  line-height: 1.9;
}

.verse-block {
  opacity: 0;
  transform: translateY(5px);
  transition: opacity .35s ease, transform .35s ease;
}
.verse-block.in { opacity: 1; transform: none; }

/* Chapter section heading (when range spans chapters) */
.chapter-break {
  font-family: 'Cinzel', serif;
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--muted);
  text-align: center;
  margin: 2.5rem 0 1.5rem;
  opacity: .45;
}

.vnum {
  font-family: 'Cinzel', serif;
  font-size: .52rem;
  font-weight: 600;
  color: var(--crimson);
  vertical-align: super;
  line-height: 0;
  margin-right: .18em;
  letter-spacing: .04em;
  user-select: none;
  opacity: .75;
}

/* Drop cap for verse 1 */
.verse-block[data-vn="1"] .vtext::first-letter {
  font-family: 'Cinzel', serif;
  font-size: 4rem;
  font-weight: 600;
  float: left;
  line-height: .8;
  margin: .05em .09em 0 0;
  color: var(--ink);
}

/* ── CHAPTER NAV ────────────────────────────────────────────────── */
.chap-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4rem;
  padding-top: 2rem;
  border-top: 1px solid var(--border);
}
.nav-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--muted);
  font-family: 'Cinzel', serif;
  font-size: .58rem;
  letter-spacing: .15em;
  padding: .5rem 1.2rem;
  cursor: pointer;
  text-transform: uppercase;
  transition: all .15s;
  white-space: nowrap;
}
.nav-btn:hover:not(:disabled) {
  background: var(--ink);
  color: var(--parchment);
  border-color: var(--ink);
}
.nav-btn:disabled { opacity: .22; cursor: not-allowed; }

.nav-center {
  font-family: 'Cinzel', serif;
  font-size: .55rem;
  letter-spacing: .18em;
  color: var(--muted);
  text-align: center;
  opacity: .7;
  text-transform: uppercase;
}

/* ── UTIL ANIMATIONS ────────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: none; }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* ── VERSE NAV ──────────────────────────────────────────────────── */
.verse-nav {
  display: flex;
  flex-wrap: wrap;
  gap: .3rem;
  margin-bottom: 2.5rem;
  padding-bottom: 1.75rem;
  border-bottom: 1px solid var(--border);
}
.vn-chip {
  background: none;
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--muted);
  font-family: 'Cinzel', serif;
  font-size: .58rem;
  padding: .22rem .42rem;
  cursor: pointer;
  min-width: 26px;
  text-align: center;
  transition: all .15s;
}
.vn-chip:hover {
  background: var(--ink);
  color: var(--parchment);
  border-color: var(--ink);
}
.vn-chip.active {
  background: var(--crimson);
  color: #F0E4D4;
  border-color: var(--crimson);
}

@keyframes verseFlash {
  0%   { background: rgba(184,145,58,.22); }
  35%  { background: rgba(184,145,58,.22); }
  100% { background: transparent; }
}
.verse-block.highlighted {
  animation: verseFlash 10s ease forwards;
  border-radius: 2px;
}

/* ── BOOK INDEX ─────────────────────────────────────────────────── */
.book-index { animation: fadeUp .5s ease both; }
.book-index-header { text-align: center; margin-bottom: 3rem; }
.book-index-title {
  font-family: 'Cinzel', serif;
  font-size: 2.8rem;
  font-weight: 600;
  color: var(--ink);
  line-height: 1;
  display: block;
  margin-bottom: 1.4rem;
}
.book-index-ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .9rem;
}
.book-index-ornament::before,
.book-index-ornament::after {
  content: '';
  width: 50px;
  height: 1px;
}
.book-index-ornament::before { background: var(--gold-lt); }
.book-index-ornament::after  { background: var(--gold-lt); }
.chapter-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
  gap: .5rem;
  margin-top: 2rem;
}
.chap-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--muted);
  font-family: 'Cinzel', serif;
  font-size: .75rem;
  font-weight: 500;
  padding: .55rem .25rem;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
}
.chap-btn:hover {
  background: var(--ink);
  color: var(--parchment);
  border-color: var(--ink);
}

/* ── BOOKS PANEL ─────────────────────────────────────────────── */
.books-btn {
  background: none;
  border: 1px solid #3A2810;
  border-radius: 2px;
  color: #C8B88A;
  font-size: 1rem;
  line-height: 1;
  padding: .33rem .55rem;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: .4em;
  transition: all .15s;
}
.books-btn:hover, .books-btn.open {
  background: #2E1C0A;
  border-color: var(--gold);
  color: var(--gold);
}
.books-btn-label {
  font-family: 'Cinzel', serif;
  font-size: .6rem;
  letter-spacing: .12em;
  text-transform: uppercase;
}

.books-panel {
  position: fixed;
  top: 56px;
  left: 0; right: 0;
  background: #160F04;
  border-bottom: 1px solid #2E2010;
  z-index: 99;
  max-height: calc(100vh - 56px);
  overflow-y: auto;
  animation: fadeIn .15s ease;
}
.books-panel[hidden] { display: none; }

.books-panel-inner {
  max-width: 960px;
  margin: 0 auto;
  padding: 1.5rem 1.5rem 2rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2rem 3rem;
}
.books-section-label {
  font-family: 'Cinzel', serif;
  font-size: .58rem;
  letter-spacing: .3em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: .6rem;
  padding-bottom: .5rem;
  border-bottom: 1px solid #2E2010;
}
.books-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.book-item-btn {
  background: none;
  border: none;
  color: #BBA882;
  font-family: 'EB Garamond', serif;
  font-size: 1.05rem;
  text-align: left;
  padding: .28rem .4rem;
  cursor: pointer;
  border-radius: 2px;
  transition: all .12s;
}
.book-item-btn:hover {
  background: #2E1C0A;
  color: var(--parchment);
}

/* ── RESPONSIVE ─────────────────────────────────────────────────── */
@media (max-width: 560px) {
  .wordmark, .divider { display: none; }
  .header-inner { padding: 0 .9rem; gap: .5rem; }
  main { padding: 2.5rem 1.25rem 5rem; }
  .chapter-numeral { font-size: 2.8rem; }
  .book-index-title { font-size: 2rem; }
  .verses-wrap { font-size: 1.1rem; }
  .verse-block[data-vn="1"] .vtext::first-letter { font-size: 3rem; }
  .books-btn-label { display: none; }
  .books-panel-inner { grid-template-columns: 1fr; padding: 1rem 1rem 1.5rem; gap: 1.25rem; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="wordmark" href="/" title="West Street Baptist Church"><span class="wordmark-cross">←</span>West Street Baptist</a>
    <div class="divider"></div>
    <button id="booksBtn" class="books-btn" aria-label="Browse books" type="button">
      <span>☰</span><span class="books-btn-label">Books</span>
    </button>
    <form class="nav-form" id="navForm">
      <input
        id="refInput"
        class="ref-input"
        type="text"
        placeholder="John 3  ·  Genesis 1:1  ·  Psalm 23"
        autocomplete="off"
        spellcheck="false"
      >
      <select id="transSelect" class="trans-select">
        {% for t in translations %}
        <option value="{{ t.identifier }}"{% if t.identifier == default_translation %} selected{% endif %}>{{ t.identifier | upper }}</option>
        {% endfor %}
      </select>
      <button type="submit" class="go-btn">Go</button>
    </form>
  </div>
</header>

<div id="booksPanel" class="books-panel" hidden></div>

<main id="main">
  <div class="welcome" id="welcomeEl">
    <span class="welcome-ornament">✦ ✦ ✦</span>
    <p class="welcome-title">Scripture Reader</p>
    <p class="welcome-hint">Enter a reference above to begin reading</p>
    <div class="welcome-examples">
      <button class="example-chip" data-ref="John 3" data-trans="web">John 3</button>
      <button class="example-chip" data-ref="Genesis 1" data-trans="kjv">Genesis 1</button>
      <button class="example-chip" data-ref="Psalm 23" data-trans="web">Psalm 23</button>
      <button class="example-chip" data-ref="Romans 8" data-trans="web">Romans 8</button>
      <button class="example-chip" data-ref="Isaiah 53" data-trans="kjv">Isaiah 53</button>
      <button class="example-chip" data-ref="Revelation 1" data-trans="web">Revelation 1</button>
    </div>
  </div>
</main>

  "3john":"3JN","3jn":"3JN","3jo":"3JN","3 john":"3JN",
  "jude":"JUD","jud":"JUD","revelation":"REV","rev":"REV","revelations":"REV"
};

/** Returns book ID if input is a bare book name, otherwise null. */
function resolveBookOnly(input) {
  const key = input.toLowerCase().replace(/\./g, '').trim();
  return BOOK_ALIASES[key] || null;
}

// ── State ──────────────────────────────────────────────────────────
let state = { bookId: null, bookName: null, chapter: null, translation: 'web' };

// ── DOM refs ───────────────────────────────────────────────────────
const main      = document.getElementById('main');
const navForm   = document.getElementById('navForm');
const refInput  = document.getElementById('refInput');
const transSelect = document.getElementById('transSelect');

// ── Init ───────────────────────────────────────────────────────────
(function init() {
  const p = new URLSearchParams(window.location.search);
  const ref   = p.get('ref');
  const trans = p.get('translation');
  if (trans && transSelect.querySelector(`option[value="${CSS.escape(trans)}"]`)) {
    transSelect.value = trans;
  }
  if (ref) {
    const cleanRef = ref.replace(/\+/g,' ');
    refInput.value = cleanRef;
    const bookId = resolveBookOnly(cleanRef);
    if (bookId) { showBookIndex(bookId, false); }
    else { loadPassage(cleanRef, transSelect.value, false); }
  }
  // example chips
  document.querySelectorAll('.example-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const ref   = btn.dataset.ref;
      const trans = btn.dataset.trans;
      refInput.value = ref;
      if (trans && transSelect.querySelector(`option[value="${CSS.escape(trans)}"]`)) {
        transSelect.value = trans;
      }
      loadPassage(ref, transSelect.value, true);
    });
  });
})();

// ── Book index ─────────────────────────────────────────────────────
function showBookIndex(bookId, pushHistory) {
  const displayName = BOOK_DISPLAY_NAMES[bookId] || bookId;
  const chapCount   = CHAPTER_COUNTS[bookId] || 1;

  let btns = '';
  for (let i = 1; i <= chapCount; i++) {
    btns += `<button class="chap-btn" data-book="${esc(displayName)}" data-ch="${i}">${i}</button>`;
  }

  main.innerHTML = `
    <div class="book-index">
      <div class="book-index-header">
        <span class="book-label">Select a chapter</span>
        <span class="book-index-title">${esc(displayName)}</span>
        <div class="book-index-ornament"><span class="ornament-center">✦</span></div>
      </div>
      <div class="chapter-grid">${btns}</div>
    </div>`;

  document.querySelectorAll('.chap-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const ref = `${btn.dataset.book} ${btn.dataset.ch}`;
      refInput.value = ref;
      loadPassage(ref, transSelect.value, true);
    });
  });

  if (pushHistory) {
    history.pushState({bookIndex: bookId}, '', `bible?ref=${encodeURIComponent(displayName)}`);
    refInput.value = displayName;
  }
}

// ── Events ─────────────────────────────────────────────────────────
navForm.addEventListener('submit', e => {
  e.preventDefault();
  const ref = refInput.value.trim();
  if (!ref) return;
  const bookId = resolveBookOnly(ref);
  if (bookId) { showBookIndex(bookId, true); return; }
  loadPassage(ref, transSelect.value, true);
});

transSelect.addEventListener('change', () => {
  const ref = refInput.value.trim();
  if (ref) loadPassage(ref, transSelect.value, true);
  else if (state.bookId) {
    const ref2 = `${state.bookName} ${state.chapter}`;
    refInput.value = ref2;
    loadPassage(ref2, transSelect.value, true);
  }
});

window.addEventListener('popstate', e => {
  if (e.state?.bookIndex) {
    refInput.value = BOOK_DISPLAY_NAMES[e.state.bookIndex] || e.state.bookIndex;
    showBookIndex(e.state.bookIndex, false);
  } else if (e.state?.ref) {
    refInput.value = e.state.ref;
    if (e.state.translation) transSelect.value = e.state.translation;
    loadPassage(e.state.ref, e.state.translation || 'web', false);
  }
});

// ── Core load ──────────────────────────────────────────────────────
async function loadPassage(ref, translation, pushHistory) {
  showLoading();
  try {
    const url = `passage?ref=${encodeURIComponent(ref)}&translation=${encodeURIComponent(translation)}`;
    const resp = await fetch(url);
    if (!resp.ok) {
      const body = await resp.json().catch(() => ({}));
      showError(body.error || `Not found: "${ref}"`);
      return;
    }
    const data = await resp.json();
    renderPassage(data, translation);
    if (pushHistory) {
      const cleanRef = `${state.bookName} ${state.chapter}`;
      history.pushState({ref: cleanRef, translation}, '', `bible?ref=${encodeURIComponent(cleanRef)}&translation=${encodeURIComponent(translation)}`);
      refInput.value = cleanRef;
    }
  } catch (err) {
    showError('Could not reach the server');
  }
}

// ── Render ─────────────────────────────────────────────────────────
function renderPassage(data, translation) {
  const verses = data.verses;
  if (!verses?.length) { showError('No verses found'); return; }

  // Update state from first verse
  state.bookId    = verses[0].book_id;
  state.bookName  = verses[0].book_name;
  state.chapter   = verses[0].chapter;
  state.translation = translation;

  const chapters = [...new Set(verses.map(v => v.chapter))];
  const chapDisplay = chapters.length === 1
    ? toRoman(chapters[0])
    : `${toRoman(chapters[0])}–${toRoman(chapters[chapters.length - 1])}`;

  const transLabel = (TRANSLATIONS.find(t => t.identifier === translation) || {}).identifier || translation;

  // Build verse HTML - group by chapter for multi-chapter ranges
  let verseHtml = '';
  let prevChap = null;
  verses.forEach((v, i) => {
    if (v.chapter !== prevChap && chapters.length > 1) {
      verseHtml += `<div class="chapter-break">${toRoman(v.chapter)}</div>`;
      prevChap = v.chapter;
    }
    // Only show drop cap on verse 1 of chapter, single-chapter views
    const isFirst = v.verse === 1 && chapters.length === 1;
    const delay = Math.min(i * 25, 800);
    verseHtml += `
      <span class="verse-block${isFirst ? '' : ''}" data-vn="${v.verse}" style="transition-delay:${delay}ms">
        <sup class="vnum">${v.verse}</sup><span class="vtext">${esc(v.text)} </span>
      </span>`;
    prevChap = v.chapter;
  });

  // Nav state
  const bookIdx  = BOOK_ORDER.indexOf(state.bookId);
  const maxChap  = CHAPTER_COUNTS[state.bookId] || 999;
  const hasPrev  = state.chapter > 1 || bookIdx > 0;
  const hasNext  = state.chapter < maxChap || bookIdx < BOOK_ORDER.length - 1;

  // Verse nav (single-chapter only)
  let verseNavHtml = '';
  if (chapters.length === 1) {
    const chips = verses.map(v =>
      `<button class="vn-chip" data-vn="${v.verse}">${v.verse}</button>`
    ).join('');
    verseNavHtml = `<div class="verse-nav">${chips}</div>`;
  }

  main.innerHTML = `
    <div class="passage-header">
      <span class="book-label">${esc(state.bookName)}</span>
      <span class="chapter-numeral">${chapDisplay}</span>
      <div class="chapter-ornament"><span class="ornament-center">✦</span></div>
      <span class="trans-pill">${esc(transLabel.toUpperCase())}</span>
    </div>
    ${verseNavHtml}
    <div class="verses-wrap" id="versesWrap">${verseHtml}</div>
    <div class="chap-nav">
      <button class="nav-btn" id="prevBtn" ${hasPrev ? '' : 'disabled'}>← Previous</button>
      <span class="nav-center">${esc(state.bookName)} &middot; ${state.chapter}</span>
      <button class="nav-btn" id="nextBtn" ${hasNext ? '' : 'disabled'}>Next →</button>
    </div>`;

  // Stagger verse entrance
  requestAnimationFrame(() => {
    document.querySelectorAll('.verse-block').forEach(el => el.classList.add('in'));
  });

  // Verse nav click handlers
  document.querySelectorAll('.vn-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const vn = chip.dataset.vn;
      const block = document.querySelector(`.verse-block[data-vn="${vn}"]`);
      if (!block) return;

      // Clear previous active chip and highlight
      document.querySelectorAll('.vn-chip.active').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.verse-block.highlighted').forEach(el => {
        el.classList.remove('highlighted');
        void el.offsetWidth; // force reflow so animation restarts if same verse clicked twice
      });

      chip.classList.add('active');
      block.classList.add('highlighted');
      block.scrollIntoView({ behavior: 'smooth', block: 'center' });

      block.addEventListener('animationend', () => {
        block.classList.remove('highlighted');
        chip.classList.remove('active');
      }, { once: true });
    });
  });

  document.getElementById('prevBtn').addEventListener('click', navigatePrev);
  document.getElementById('nextBtn').addEventListener('click', navigateNext);
}

// ── Navigation ─────────────────────────────────────────────────────
function navigatePrev() {
  if (!state.bookId) return;
  const bookIdx = BOOK_ORDER.indexOf(state.bookId);
  let ref;
  if (state.chapter > 1) {
    ref = `${state.bookName} ${state.chapter - 1}`;
  } else if (bookIdx > 0) {
    const prevId    = BOOK_ORDER[bookIdx - 1];
    const prevChaps = CHAPTER_COUNTS[prevId] || 1;
    ref = `${prevId} ${prevChaps}`;   // book_id works as ref input
  } else return;
  refInput.value = ref;
  loadPassage(ref, state.translation, true);
}

function navigateNext() {
  if (!state.bookId) return;
  const bookIdx = BOOK_ORDER.indexOf(state.bookId);
  const maxChap = CHAPTER_COUNTS[state.bookId] || 999;
  let ref;
  if (state.chapter < maxChap) {
    ref = `${state.bookName} ${state.chapter + 1}`;
  } else if (bookIdx < BOOK_ORDER.length - 1) {
    ref = `${BOOK_ORDER[bookIdx + 1]} 1`;
  } else return;
  refInput.value = ref;
  loadPassage(ref, state.translation, true);
}

// ── Loading / Error states ─────────────────────────────────────────
function showLoading() {
  main.innerHTML = `
    <div class="loading-wrap">
      <p class="loading-text">Opening scripture</p>
      <div class="loading-bar"></div>
    </div>`;
}

function showError(msg) {
  main.innerHTML = `
    <div class="error-wrap">
      <span class="error-glyph">✦</span>
      <p class="error-msg">${esc(msg)}</p>
    </div>`;
}

// ── Helpers ────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function toRoman(n) {
  if (!n || n < 1 || n > 3999) return String(n);
  const v = [1000,900,500,400,100,90,50,40,10,9,5,4,1];
  const s = ['M','CM','D','CD','C','XC','L','XL','X','IX','V','IV','I'];
  let r = '';
  v.forEach((val,i) => { while(n >= val) { r += s[i]; n -= val; } });
  return r;
}

// ── Books panel ────────────────────────────────────────────────────
(function initBooksPanel() {
  const OT_END    = BOOK_ORDER.indexOf('MAT'); // 39 OT books
  const booksBtn   = document.getElementById('booksBtn');
  const booksPanel = document.getElementById('booksPanel');

  function makeList(ids) {
    return ids.map(id =>
      `<button class="book-item-btn" data-book-id="${id}">${esc(BOOK_DISPLAY_NAMES[id] || id)}</button>`
    ).join('');
  }

  booksPanel.innerHTML = `
    <div class="books-panel-inner">
      <div class="books-section">
        <div class="books-section-label">Old Testament</div>
        <div class="books-list">${makeList(BOOK_ORDER.slice(0, OT_END))}</div>
      </div>
      <div class="books-section">
        <div class="books-section-label">New Testament</div>
        <div class="books-list">${makeList(BOOK_ORDER.slice(OT_END))}</div>
      </div>
    </div>`;

  booksPanel.querySelectorAll('.book-item-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      closePanel();
      showBookIndex(btn.dataset.bookId, true);
    });
  });

  function closePanel() {
    booksPanel.hidden = true;
    booksBtn.classList.remove('open');
  }

  booksBtn.addEventListener('click', e => {
    e.stopPropagation();
    const opening = booksPanel.hidden;
    booksPanel.hidden = !opening;
    booksBtn.classList.toggle('open', opening);
  });

  document.addEventListener('click', e => {
    if (!booksPanel.hidden && !booksPanel.contains(e.target) && e.target !== booksBtn) {
      closePanel();
    }
  });
})();
</script>
